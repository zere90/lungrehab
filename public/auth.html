<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход / Регистрация</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-box {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 450px;
      width: 100%;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-header h1 {
      margin: 0 0 10px 0;
      color: #333;
      font-size: 28px;
    }

    .auth-header p {
      margin: 0;
      color: #666;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      border: none;
      background: #f0f0f0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .tab.active {
      background: var(--primary);
      color: white;
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: border 0.3s;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .submit-btn:hover {
      background: #0D47A1;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(30,136,229,0.3);
    }

    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .success-message {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <div class="logo">
      <a href="index.html">Реабилитация лёгких</a>
    </div>
    <nav class="nav">
      <a href="index.html">Главная</a>
      <a href="news.html">Новости</a>
    </nav>
    <div class="burger" onclick="toggleMenu()">☰</div>
  </div>
  <div class="mobile-nav" id="mobileNav">
    <a href="index.html">Главная</a>
    <a href="news.html">Новости</a>
  </div>
</header>

<div class="auth-container">
  <div class="auth-box">
    <div class="auth-header">
      <h1>🫁 Реабилитация лёгких</h1>
      <p>Начните обучение прямо сейчас</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Вход</button>
      <button class="tab" onclick="showTab('register')">Регистрация</button>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <!-- ФОРМА ВХОДА -->
    <div id="loginForm" class="form-section active">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required placeholder="example@mail.com">
        </div>

        <div class="form-group">
          <label>Пароль</label>
          <input type="password" name="password" required placeholder="••••••••">
        </div>

        <button type="submit" class="submit-btn">Войти</button>
      </form>
    </div>

    <!-- ФОРМА РЕГИСТРАЦИИ -->
    <div id="registerForm" class="form-section">
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Имя и Фамилия</label>
          <input type="text" name="full_name" required placeholder="Иван Иванов">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required placeholder="example@mail.com">
        </div>

        <div class="form-group">
          <label>Логин</label>
          <input type="text" name="username" required placeholder="ivanov123">
        </div>

        <div class="form-group">
          <label>Пароль</label>
          <input type="password" name="password" required minlength="4" placeholder="••••••••">
        </div>

        <button type="submit" class="submit-btn">Зарегистрироваться</button>
      </form>
    </div>

    <div class="back-link">
      <a href="index.html">← Вернуться на главную</a>
    </div>
  </div>
</div>

<script src="menu.js"></script>
<script>
  function showTab(tab) {
    // Переключение табов
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));

    if (tab === 'login') {
      document.querySelectorAll('.tab')[0].classList.add('active');
      document.getElementById('loginForm').classList.add('active');
    } else {
      document.querySelectorAll('.tab')[1].classList.add('active');
      document.getElementById('registerForm').classList.add('active');
    }

    // Очистка сообщений
    hideMessages();
  }

  function showError(message) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.textContent = message;
    errorDiv.style.display = 'block';
    setTimeout(() => errorDiv.style.display = 'none', 5000);
  }

  function showSuccess(message) {
    const successDiv = document.getElementById('successMessage');
    successDiv.textContent = message;
    successDiv.style.display = 'block';
    setTimeout(() => successDiv.style.display = 'none', 3000);
  }

  function hideMessages() {
    document.getElementById('errorMessage').style.display = 'none';
    document.getElementById('successMessage').style.display = 'none';
  }

  async function handleLogin(event) {
    event.preventDefault();
    hideMessages();

    const formData = new FormData(event.target);
    const data = {
      email: formData.get('email'),
      password: formData.get('password')
    };

    try {
      const response = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (response.ok) {
        localStorage.setItem('user', JSON.stringify(result.user));
        showSuccess('Успешный вход! Перенаправление...');
        setTimeout(() => window.location.href = 'education.html', 1000);
      } else {
        showError(result.error || 'Ошибка входа');
      }
    } catch (error) {
      console.error('Ошибка:', error);
      showError('Ошибка соединения с сервером');
    }
  }

  async function handleRegister(event) {
    event.preventDefault();
    hideMessages();

    const formData = new FormData(event.target);
    const data = {
      full_name: formData.get('full_name'),
      email: formData.get('email'),
      username: formData.get('username'),
      password: formData.get('password')
    };

    try {
      const response = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (response.ok) {
        showSuccess('Регистрация успешна! Теперь войдите.');
        setTimeout(() => {
          showTab('login');
          // Автозаполнение email
          document.querySelector('#loginForm input[name="email"]').value = data.email;
        }, 1500);
      } else {
        showError(result.error || 'Ошибка регистрации');
      }
    } catch (error) {
      console.error('Ошибка:', error);
      showError('Ошибка соединения с сервером');
    }
  }
</script>

</body>
</html>
