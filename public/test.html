<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Итоговый тест</title>
  <link rel="stylesheet" href="style.css">
  <script src="auth-check.js"></script>
  <style>
    body{
      background-image: url("https://cdn.pixabay.com/photo/2020/02/13/05/53/coronavirus-4844592_1280.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      margin:0;
    }
    body::before{
      content:"";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      pointer-events: none;
      z-index: 0;
    }

    /* БЕЛЫЙ ТЕКСТ */
    .section-title {
      color: #ffffff !important;
      text-shadow: 0 6px 20px rgba(0,0,0,0.9);
      position: relative;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 1;
    }

    .test-box{
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(4px);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.18);
    }
    .question{
      margin: 18px 0;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(0,0,0,0.06);
    }
    .question h3{
      margin: 0 0 10px 0;
      font-size: 18px;
      color: #0D47A1;
    }
    .options label{
      display:block;
      margin: 8px 0;
      cursor: pointer;
      user-select: none;
      padding: 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .options label:hover {
      background: rgba(30, 136, 229, 0.05);
    }
    .actions{
      margin-top: 22px;
      display:flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* модалка */
    .modal-overlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 16px;
      z-index: 9999;
    }
    .modal{
      background: #fff;
      border-radius: 14px;
      max-width: 520px;
      width: 100%;
      padding: 18px 18px 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .modal-header{
      display:flex;
      align-items:center;
      gap: 10px;
      margin-bottom: 8px;
      font-weight: 800;
    }
    .modal-header .icon{ font-size: 18px; }
    .modal-actions{
      display:flex;
      justify-content:flex-end;
      margin-top: 12px;
    }
    .modal-actions button{
      border: none;
      background: transparent;
      color: var(--primary);
      font-weight: 800;
      cursor: pointer;
      padding: 8px 10px;
    }
  </style>
</head>

<body>

<header class="header">
  <div class="container header-inner">
    <div class="logo">
      <a href="index.html">Реабилитация лёгких</a>
    </div>
    <nav class="nav">
      <a href="index.html">Главная</a>
      <a href="education.html">Обучение</a>
      <a href="news.html">Новости</a>
      <a href="profile.html">Личный кабинет</a>
    </nav>
    <div class="burger" onclick="toggleMenu()">☰</div>
  </div>
  <div class="mobile-nav" id="mobileNav">
    <a href="index.html">Главная</a>
    <a href="education.html">Обучение</a>
    <a href="news.html">Новости</a>
    <a href="profile.html">Личный кабинет</a>
  </div>
</header>

<section class="container" style="padding: 80px 0;">
  <h1 class="section-title">Итоговый тест</h1>

  <div class="test-box">
    <p style="margin-top:0;">
      Ответьте на вопросы. Для успешного завершения курса нужно набрать минимум <strong>5 из 7</strong>.
      <br>(Порядок ответов каждый раз случайный, вопросы идут по порядку.)
    </p>

    <form id="quizForm">
      <div id="quizQuestions"></div>

      <div class="actions">
        <a href="education.html" class="btn" style="background:white; color:var(--primary); border:2px solid var(--primary);">
          ← Назад к курсу
        </a>
        <button type="submit" class="btn">
          ✅ Завершить тест и получить результат
        </button>
      </div>
    </form>
  </div>
</section>

<!-- модалка -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="icon" id="modalIcon">ℹ️</span>
      <span id="modalTitle">Сообщение</span>
    </div>
    <div id="modalMessage"></div>
    <div class="modal-actions">
      <button type="button" onclick="closeModal()">Закрыть</button>
    </div>
  </div>
</div>

<script src="menu.js"></script>
<script>
  if (typeof checkAuth === 'function') checkAuth();

  const quizForm = document.getElementById('quizForm');
  const quizQuestionsEl = document.getElementById('quizQuestions');

  // ПРАВИЛЬНЫЕ ВОПРОСЫ ОТ ПОЛЬЗОВАТЕЛЯ
  const QUESTIONS = [
    {
      id: "q1",
      text: "1. Основная цель реабилитации после лечения рака лёгких:",
      options: [
        { v: "a", t: "Назначение новых лекарств" },
        { v: "b", t: "Улучшение качества жизни и восстановление функции лёгких" },
        { v: "c", t: "Полный отказ от физической активности" },
        { v: "d", t: "Исключительно хирургическое лечение" }
      ],
      correct: "b"
    },
    {
      id: "q2",
      text: "2. Дыхательные упражнения способствуют:",
      options: [
        { v: "a", t: "Улучшению вентиляции лёгких" },
        { v: "b", t: "Увеличению массы тела" },
        { v: "c", t: "Повышению температуры тела" },
        { v: "d", t: "Снижению давления" }
      ],
      correct: "a"
    },
    {
      id: "q3",
      text: "3. Физическая активность должна быть:",
      options: [
        { v: "a", t: "Только силовые тренировки" },
        { v: "b", t: "Исключена полностью" },
        { v: "c", t: "Интенсивной без ограничений" },
        { v: "d", t: "Постепенной и контролируемой" }
      ],
      correct: "d"
    },
    {
      id: "q4",
      text: "4. Рацион питания должен включать:",
      options: [
        { v: "a", t: "Белки, витамины и достаточное количество жидкости" },
        { v: "b", t: "Только углеводы" },
        { v: "c", t: "Жирную пищу" },
        { v: "d", t: "Полный отказ от еды" }
      ],
      correct: "a"
    },
    {
      id: "q5",
      text: "5. Психологическая поддержка важна потому что:",
      options: [
        { v: "a", t: "Помогает снизить стресс и адаптироваться" },
        { v: "b", t: "Не влияет на восстановление" },
        { v: "c", t: "Заменяет упражнения" },
        { v: "d", t: "Увеличивает нагрузку" }
      ],
      correct: "a"
    },
    {
      id: "q6",
      text: "6. Самоконтроль симптомов позволяет:",
      options: [
        { v: "a", t: "Корректировать программу восстановления" },
        { v: "b", t: "Увеличить стресс" },
        { v: "c", t: "Отказаться от лечения" },
        { v: "d", t: "Игнорировать рекомендации врача" }
      ],
      correct: "a"
    },
    {
      id: "q7",
      text: "7. Завершение программы подтверждается:",
      options: [
        { v: "a", t: "Регистрацией" },
        { v: "b", t: "Получением результата теста" },
        { v: "c", t: "Устным подтверждением" },
        { v: "d", t: "Просмотром видео" }
      ],
      correct: "b"
    }
  ];

  // Shuffle function - only for answers
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function openModal(type, message) {
    const overlay = document.getElementById('modalOverlay');
    const icon = document.getElementById('modalIcon');
    const title = document.getElementById('modalTitle');
    const msg = document.getElementById('modalMessage');

    if (type === 'error') { icon.textContent = '❌'; title.textContent = 'Ошибка'; }
    else if (type === 'success') { icon.textContent = '✅'; title.textContent = 'Отлично!'; }
    else { icon.textContent = 'ℹ️'; title.textContent = 'Сообщение'; }

    msg.textContent = message;
    overlay.style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
  }

  function renderQuiz() {
    quizQuestionsEl.innerHTML = '';

    // KEEP QUESTIONS IN ORDER - Only shuffle answers
    QUESTIONS.forEach((q) => {
      const block = document.createElement('div');
      block.className = 'question';
      block.dataset.qid = q.id;

      const h = document.createElement('h3');
      h.textContent = q.text;
      block.appendChild(h);

      const opts = document.createElement('div');
      opts.className = 'options';

      // SHUFFLE ONLY THE ANSWERS
      const shuffledOptions = shuffle(q.options);
      
      shuffledOptions.forEach(opt => {
        const label = document.createElement('label');
        label.innerHTML = `<input type="radio" name="${q.id}" value="${opt.v}"> ${opt.t}`;
        opts.appendChild(label);
      });

      block.appendChild(opts);
      quizQuestionsEl.appendChild(block);
    });
  }

  renderQuiz();

  quizForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    await submitTest();
  });

  async function submitTest() {
    const totalQuestions = QUESTIONS.length;
    const answers = {};
    let score = 0;

    for (const q of QUESTIONS) {
      const selected = document.querySelector(`input[name="${q.id}"]:checked`);
      if (!selected) {
        openModal('error', 'Ответьте на все вопросы, пожалуйста.');
        return;
      }
      answers[q.id] = selected.value;
      if (selected.value === q.correct) score++;
    }

    const passed = score >= 5;

    try {
      const response = await fetch('/api/test/submit', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          score: score,
          total_questions: totalQuestions,
          answers: answers
        })
      });

      if (!response.ok) {
        openModal('error', 'Ошибка отправки теста. Проверьте авторизацию.');
        return;
      }

      if (passed) {
        openModal('success', `Поздравляем! Результат: ${score} из ${totalQuestions}.`);
        setTimeout(() => window.location.href = 'certificate.html', 1500);
      } else {
        openModal('error', `Результат: ${score} из ${totalQuestions}. Нужно минимум 5 из 7. Попробуйте ещё раз.`);
      }
    } catch (err) {
      console.error(err);
      openModal('error', 'Ошибка соединения с сервером.');
    }
  }
</script>

</body>
</html>
